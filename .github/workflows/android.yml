name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 22

      # ✅ Tumia Java 17 (fix ya error ya "invalid source release: 21")
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      # ✅ Install Capacitor properly (fix ya permission denied)
      - name: Install Capacitor CLI
        run: npm install @capacitor/cli

      # ✅ Hakikisha android ipo
      - name: Add Android platform
        run: npx @capacitor/cli add android || echo "Already exists"

      # ✅ Sync bila error ya cap permission
      - name: Sync Capacitor
        run: npx @capacitor/cli sync android

      # ✅ Build DEBUG APK (hakuna signing)
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # ✅ Upload APK sahihi
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk