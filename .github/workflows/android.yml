name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # ✅ Java 17 (sahihi kabisa)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      # 🔥 FIX permission ya cap (HII NDIO ILIKUA INAKOSEKANA)
      - name: Fix cap permission
        run: chmod +x node_modules/.bin/cap

      # ✅ Hakikisha android ipo
      - name: Add Android platform
        run: npx cap add android || echo "Already exists"

      - name: Sync Capacitor
        run: npx cap sync android

      # ✅ Build DEBUG APK
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # ✅ Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk