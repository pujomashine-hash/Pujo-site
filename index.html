<!DOCTYPE html>
<html lang="en">
 <head>

  <meta charset="UTF-8">

  <link rel="stylesheet" href="PUJO HYMNS.css">
  <link rel="manifest" href="manifest.json">
 </head>
 <body>
   <div id="top">
     <input type="text" placeholder="Tafuta wimbo  hapa" id="search">
     <h1> My Music </h1>
   </div>
  <div id="song-list">
    <button class="nyimbo"
    data-lyrics="Aitwa wa simanzi.txt"
    data-file=""><strong>⓵.Aitwa wa Simanzi</strong><br>  PUJO hymns
    </button>
    <button class="nyimbo" 
    data-src=""
    data-lyrics="Bwana u sehemu yangu.txt"><strong>⓶.Bwana u sehemu yangu </strong><br> PUJO hymns </button> <br>
    <button class="nyimbo"
    data-file="Njooni tumsifuni Mungu"

    <button class="nyimbo"
     data-src=""
     data-lyrics="Salamu yesu Bwanangu.txt"
     > <strong>⓸.Salamu Yesu Bwanangu</strong></button> <br>
     <button class="nyimbo"
     data-src=""

  </div>
  <div id="song-details">
     <h3 id="title"> </h3>
