<!DOCTYPE html>
<html lang="en">
 <head>
  <title> PUJO HYMNS </title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="stylesheet" href="PUJO HYMNS.css">
  <link rel="manifest" href="manifest.json">
 </head>
 <body>
   <!-- MENU NA TOP -->
   <div id="top">
     <aside id="left">
       <button id="menu-btn"> ≡ </button>
        <div id="menu">
         <p> PUJO HYMNS<br> Version 1.9.7.1 </p>
        </div>
      </aside>
     <input type="text" placeholder="Tafuta wimbo  hapa" id="search">
   </div>
     <button id="All"> All </button>
    <div id="song-list" class="screen">
    <!-- PLAYLIST -->
     <div id="playlist-container">
      <div id="playlist-content">
       <div class="playlist">
         <div class="circle" style="background-image:url(https://ik.imagekit.io/pry8rixl0/logo.png)"></div>
         <div class="playlist-name">PUJO hymns</div>
       </div>
       <div class="playlist">
         <div class="circle" style="background-image:url(https://ik.imagekit.io/pry8rixl0/I.jpeg)"></div>
         <div class="playlist-name">Kijitonyama youth choir</div>
       </div>
       <div class="playlist">
         <div class="circle" style="background-image:url(https://ik.imagekit.io/pry8rixl0/SS.png)"></div>
         <div class="playlist-name">Sylivester Soud</div>
       </div>
       <div class="playlist">
         <div class="circle" style="background-image:url(https://ik.imagekit.io/pry8rixl0/EH.png)"></div>
         <div class="playlist-name">English Hymns</div>
       </div>
     </div>
   </div>
   <!-- js inaunda button hapa -->
    
  </div>
  <div id="song-details" class="screen">
     <div class="player">
         <p id="playing"> Nothing here </p>
        <div id="progress-container">
          <div id="progress"></div>
        </div>
         <audio id="audio"> </audio>
         <button id="play" class="controlbtn">play ⏯ </button>
         <button id="back" class="controlbtn"> Return⏹️</button>
         <button id="fav" class="controlbtn">add ♥️</button>
     </div>
            <p id="lyrics"> </p>
  </div>
  <div id="playlist" class="screen">
    <p> Your playlist will appear here when they available</p>
  </div>
  <div id="favourite" class="screen">
    <p> favourite Song will appear here </p>
  </div>
  <div id="navigation-bar">
    <button class="change"
    data-target="song-list">🏠 Home </button> 
    <button class="change"
    data-target="playlist">🎬 Playlist</button>
    <button class="change"
    data-target="favourite">♥️ Favourite</button>
  </div>
  <script src="PUJO HYMNS.js"> </script>
 </body>
</html>
