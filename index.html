<!DOCTYPE html>
<html lang="en">
 <head>
  <title> PUJO HYMNS </title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="stylesheet" href="PUJO HYMNS.css">
  <link rel="manifest" href="manifest.json">
 </head>
 <body>
   <div id="top">
     <input type="text" placeholder="Tafuta wimbo  hapa" id="search">
   </div>
  <div id="song-list" class="screen">
   <!-- js inaunda button hapa -->
  </div>
  <div id="song-details" class="screen">
     <h3 id="title"> </h3>
     <audio controls id="audio" controlsList="nodownload"> </audio> <br>
       <button id="play"> play ▶️</button>
       <button id="pause"> pause ⏯️</button>
       <button id="back"> Return⏹️</button>
       <button id="midi"> play midi📀</button>
            <p id="lyrics"> </p>
  </div>
  <div id="playlist" class="screen">
    <p> Your playlist will appear here when tey available</p>
  </div>
  <div id="favourite" class="screen">
    <p> favourite Song will appear here </p>
  </div>
  <div id="navigation-bar">
    <button class="change"
    data-target="song-list">🏠 Home </button> 
    <button class="change"
    data-target="playlist">🎬 Playlist</button>
    <button class="change"
    data-target="favourite">♥️ Favourite</button>
  </div>
  <script src="PUJO HYMNS.js"> </script>
 </body>
</html>
